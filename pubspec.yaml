name: autoresq
description: Asistencia en emergencias automotrices - Riobamba, Ecuador
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.5.0

  # Google Auth (Supabase OAuth)
  google_sign_in: ^6.2.1

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0

  # HTTP
  dio: ^5.4.3

  # Functional programming
  dartz: ^0.10.1

  # Fonts & UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  iconsax: ^0.0.8
  cached_network_image: ^3.3.1

  # Storage
  flutter_secure_storage: ^9.0.0

  # Media
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
