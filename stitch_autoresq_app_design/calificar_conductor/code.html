<h1 class="font-title-lg text-title-lg text-on-surface flex-grow text-center pr-10">Calificar al cliente</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[calc(64px+24px)] pb-page_padding px-page_padding flex flex-col items-center max-w-md mx-auto w-full">
<!-- Driver Info -->
<div class="flex flex-col items-center mb-stack_lg w-full">
<div class="w-[72px] h-[72px] rounded-full overflow-hidden mb-stack_sm shadow-sm ring-4 ring-surface-variant">
<img alt="Juan Pérez Profile" class="w-full h-full object-cover" data-alt="close-up portrait of a smiling middle-aged hispanic man outdoors in natural daylight, wearing a casual shirt" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzF96JTmlGM6Z0l45iFb81iJNVGR6rs8CbwkM2aBcNkaXhf7CcuM5rh54atyUhV-L1I387d3M6MOwK8hltGfLsd8HwjAPmrbcnJuu9YIEf7MyWUIxveNqrwPhKAY4ixnhVZWtvKMQTVm6C7B0NtGUmrkVEkT87VxYpzd9bCNgf86S4QBnaSusZb8oTA61CKegt3OqqCQrOiIqNQOlG1uVRRzy2RNlY1vYSArOS8MI2oVEGkYBK4cTSKhv3MMSq0qNmhr7mFuMR7Pg"/>
</div>
<h2 class="font-title-lg text-title-lg text-on-surface text-center">Juan Pérez</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-1 bg-surface-container px-3 py-1 rounded-full">Toyota Hilux · ABC-1234</p>
</div>
<!-- Rating Prompt -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.08)] p-page_padding flex flex-col items-center mb-stack_lg">

<!-- Stars -->
<div class="flex justify-center gap-2 mb-stack_lg">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[48px] text-surface-variant" data-icon="star">star</span>
</div>
<!-- Comment Input -->
<div class="w-full">
<textarea class="w-full bg-surface text-on-surface font-body-md text-body-md rounded-[24px] border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary p-4 min-h-[120px] resize-none placeholder:text-on-surface-variant/60 transition-colors" placeholder="Añade un comentario..."></textarea>
