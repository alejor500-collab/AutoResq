<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AutoResQ - Cierre de Servicio</title>

                        "tertiary-fixed-dim": "#72d4ef",
                        "on-background": "#271716",
                        "on-tertiary-fixed-variant": "#004e5d",
                        "primary-fixed-dim": "#ffb4ac",

                        "primary-container": "#db322f",

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pt-[64px]">
<!-- TopAppBar (Transactional - Hidden Nav Shell for Canvas Priority) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-page_padding h-[64px] bg-surface-bright shadow-sm border-b border-surface-container-high transition-all duration-200">
<button class="flex items-center justify-center p-2 -ml-2 text-on-surface hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface absolute left-1/2 -translate-x-1/2">Cerrar Servicio</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 px-page_padding py-stack_lg flex flex-col items-center">
<!-- Success Icon -->
<div class="mt-stack_lg mb-stack_md flex items-center justify-center w-[72px] h-[72px] rounded-full bg-[#E8F5E9] text-[#2E7D32]">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Headings -->
<div class="text-center mb-stack_lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack_sm">¿Todo listo?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Confirma los detalles antes de cerrar</p>
</div>
<!-- Summary Card -->
<div class="w-full bg-surface rounded-[16px] shadow-[0_2px_8px_rgba(0,0,0,0.08)] p-stack_md flex flex-col gap-stack_md mb-stack_lg">
<!-- Driver Info -->
<div class="flex items-center gap-stack_md pb-stack_sm border-b border-surface-container-highest">
<img alt="Juan Pérez Avatar" class="w-12 h-12 rounded-full object-cover border-2 border-surface-container-high" data-alt="close-up portrait of a smiling young hispanic man in a casual blue shirt against a neutral background, natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5lHfKMSEFnAxABO-b5BElt_zKyh-UsCMgj62rzpmkcfoDTg-i1_W-uOq-sdnAWUyXPI6W6t1xeRsMijm14_uNzaDErpagtk0SVgk084S62BsGzhtFH845LPjqgDG7XxdvrDbkH5_wbsJUFtTVcGIARm4PY8wR5nxAa3pagA8LJS7v-u0zvJwRMYyT4l8AA6lZDW2DfzRNJIlo4gXerUIFxNWecVuzmnJ6SdpsuAm9ybzu6-isPvB7OfkglMebKUfYKDgbzgj24yg"/>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Cliente</p>
<p class="font-title-lg text-title-lg text-on-surface">Juan Pérez</p>
</div>
</div>
<!-- Vehicle & Time Info -->
<div class="grid grid-cols-2 gap-stack_md">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Vehículo</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">Toyota Hilux</p>
<p class="font-body-md text-body-md text-on-surface-variant">ABC-1234</p>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Tiempo de Respuesta</p>
<div class="flex items-center gap-1 text-on-surface">
<span class="material-symbols-outlined text-[18px]">timer</span>
<p class="font-body-lg text-body-lg font-semibold">45 min</p>
</div>
</div>
</div>
<!-- Type Chip -->
<div class="flex items-center gap-2 mt-stack_sm">
<p class="font-label-sm text-label-sm text-on-surface-variant">Tipo de Servicio:</p>
<div class="inline-flex items-center px-3 py-1 bg-secondary-fixed text-on-secondary-fixed rounded-full">
<span class="material-symbols-outlined text-[14px] mr-1">build</span>
<span class="font-label-sm text-label-sm">Mecánica</span>
</div>
</div>
<!-- Amount Section -->
<div class="pt-stack_md mt-stack_sm border-t border-surface-container-highest text-center bg-surface-container-low -mx-stack_md -mb-stack_md p-stack_md rounded-b-[16px]">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1">Total a cobrar</p>
<p class="font-display-lg text-display-lg text-primary mb-1">$35.00</p>
<p class="font-label-sm text-label-sm text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">payments</span>
                    Cobro directo — efectivo o transferencia
                </p>
</div>
</div>
<!-- Spacer to push button to bottom if screen is tall -->
<div class="flex-1 min-h-[40px]"></div>
<!-- Bottom Button -->
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-full flex items-center justify-center gap-2 shadow-[0_4px_12px_rgba(0,0,0,0.12)] hover:bg-surface-tint active:scale-95 transition-all mb-stack_lg">
            Confirmar y calificar cliente
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</main>
</body></html>
