<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Suppressing Shared Components (TopAppBar/BottomNavBar) due to Transactional Nature of Login/Register -->
<main class="w-full max-w-md px-6 py-12 md:py-24 flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center p-4 mb-4 bg-primary rounded-2xl shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">tire_repair</span>
</div>
<h1 class="text-3xl font-black tracking-tighter text-on-background">AutoResQ</h1>
<p class="text-secondary text-sm font-medium mt-1">Asistencia de confianza en Riobamba</p>
</div>
<!-- Role Selector Pill -->
<div class="w-full bg-surface-container-low p-1.5 rounded-full mb-8 flex items-center relative">
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold tracking-tight bg-surface-container-lowest text-primary shadow-sm transition-all duration-200">
                Conductor
            </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold tracking-tight text-secondary hover:text-on-background transition-all duration-200">
                Técnico
            </button>
</div>
<!-- Form Container -->
<div class="w-full glass-panel p-8 rounded-lg shadow-2xl shadow-on-surface/5 border border-white/20">
<div class="flex justify-between items-end mb-8">
<div>
<h2 class="text-2xl font-bold tracking-tight text-on-background">Bienvenido</h2>
<p class="text-secondary text-sm">Inicia sesión para continuar</p>
</div>
<button class="text-primary font-bold text-sm hover:opacity-80 transition-opacity">Registrarse</button>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-[0.05em] text-secondary px-1">EMAIL</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low border-none rounded-2xl text-on-background placeholder:text-secondary/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between px-1">
<label class="block text-[10px] font-bold uppercase tracking-[0.05em] text-secondary">CONTRASEÑA</label>
<button class="text-[10px] font-bold text-primary uppercase tracking-[0.05em]" type="button">¿Olvidaste?</button>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low border-none rounded-2xl text-on-background placeholder:text-secondary/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary-container to-primary text-white font-bold rounded-full shadow-lg shadow-primary/20 hover:scale-[0.98] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Continuar
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-[1px] bg-surface-container-high"></div>
</div>
<span class="relative bg-white/50 px-4 text-[10px] font-bold uppercase tracking-[0.1em] text-secondary">o</span>
</div>
<!-- Social Login -->
<button class="w-full h-14 bg-surface-container-lowest border border-surface-container-high text-on-background font-semibold rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-low transition-all duration-200">
<img alt="Google" class="w-5 h-5" data-alt="Official Google logo with vibrant primary colors and minimalist flat design on a white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBU3SetUTjXLUHdMtC1OjuoJCrATVa2M95ccUdSCta_q7SOoXEpLyGo9swGeBT16Pd6HjTrYlBqL2ocO3CmHc56y0lMM-NNcQRkFh49_NyV6I7e3o-WLGlVMZIj4gqiOSJFrFkXVqmLycdzQ1ez5xdFfBni26i2ftazZWdJ1WHSm96NeRFO7uY-4bGRKs0KGsUuJPGxup8hJgH7_Ns4Lt_vpiKbHXxVXhRpd2eD5mpr5clozgHuu18-JXMxsN9TeK4_AvS1G_fetRg"/>
                Continuar con Google
            </button>
</div>
<!-- Additional Information / Location Hook -->
<div class="mt-12 w-full grid grid-cols-2 gap-4">
<div class="p-4 rounded-3xl bg-surface-container-low flex flex-col items-center text-center">
<span class="material-symbols-outlined text-tertiary mb-2">location_on</span>
<p class="text-[10px] font-bold uppercase tracking-wider text-secondary">Cobertura</p>
<p class="text-xs font-semibold text-on-background">Riobamba &amp; Chimborazo</p>
</div>
<div class="p-4 rounded-3xl bg-surface-container-low flex flex-col items-center text-center">
<span class="material-symbols-outlined text-tertiary mb-2">verified_user</span>
<p class="text-[10px] font-bold uppercase tracking-wider text-secondary">Seguridad</p>
<p class="text-xs font-semibold text-on-background">Asistencia 24/7</p>
</div>
</div>
<!-- Footer Visual -->
<div class="mt-16 opacity-40 grayscale group-hover:grayscale-0 transition-all">
<div class="w-48 h-12 bg-surface-container-high rounded-full flex items-center justify-center gap-4 overflow-hidden px-6">
<span class="material-symbols-outlined">car_repair</span>
<span class="material-symbols-outlined">auto_towing</span>
<span class="material-symbols-outlined">local_gas_station</span>
<span class="material-symbols-outlined">build</span>
</div>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-48 -left-24 w-72 h-72 bg-tertiary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
