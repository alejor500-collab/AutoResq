<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- Top Navigation Placeholder for completeness (Hidden per rules for transactional, but leaving canvas structure clean) -->
<!-- The prompt implies a full screen transactional success state. We suppress top/bottom nav shell. -->
<main class="flex-grow flex flex-col px-page_padding pt-stack_lg pb-[100px] overflow-y-auto">
<!-- Header Section -->
<div class="flex flex-col items-center justify-center pt-stack_lg pb-stack_lg mt-8">
<div class="w-[80px] h-[80px] bg-green-100 rounded-full flex items-center justify-center mb-stack_md shadow-[0_4px_12px_rgba(16,185,129,0.2)]">
<span class="material-symbols-outlined text-[48px] text-success" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-background text-center">Servicio Completado</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center mt-stack_sm">Asistencia exitosa</p>
</div>
<!-- Summary Card -->
<div class="bg-surface-container-lowest rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.08)] p-stack_md flex flex-col gap-stack_md border border-surface-container-high relative overflow-hidden">
<!-- Decorative accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-success"></div>
<!-- Client Info -->
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">CLIENTE</span>
<span class="font-title-lg text-title-lg text-on-background">Juan Pérez</span>
</div>
<div class="w-full h-px bg-surface-container-highest"></div>
<!-- Service Details -->
<div class="grid grid-cols-2 gap-stack_md">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">TIPO DE FALLA</span>
<span class="font-body-lg text-body-lg text-on-background font-medium">Mecánica · Motor</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">TIEMPO TOTAL</span>
<span class="font-body-lg text-body-lg text-on-background font-medium">45 min</span>
</div>
</div>
<div class="w-full h-px bg-surface-container-highest"></div>
<!-- Payment -->
<div class="flex flex-col bg-surface-container-low p-stack_sm rounded-lg border border-surface-container-high">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">MONTO ACORDADO</span>
<span class="font-headline-md text-headline-md text-primary">$35.00</span>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-1 italic">Pago directo acordado con el cliente</span>
</div>
<!-- Ratings -->
<div class="flex flex-col gap-stack_sm pt-stack_sm">
<div class="flex justify-between items-center bg-surface-bright p-2 rounded-lg">
<span class="font-body-md text-body-md text-on-background">Tu calificación al cliente:</span>
<div class="flex text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[20px] text-surface-container-highest" data-icon="star">star</span>
</div>
</div>
<div class="flex justify-between items-center bg-surface-bright p-2 rounded-lg">
<span class="font-body-md text-body-md text-on-background">Calificación recibida:</span>
<div class="flex text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>

<span class="material-symbols-outlined text-[20px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>

</div>
